name: Build and Release

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  pull_request:
    branches:
      - main

jobs:
  build:
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            arch: x64
          - platform: macos-latest
            target: aarch64-apple-darwin
            arch: aarch64
          - platform: macos-15-intel
            target: x86_64-apple-darwin
            arch: x64

    runs-on: ${{ matrix.platform }}

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install dependencies (macOS)
        if: startsWith(matrix.platform, 'macos')
        run: |
          rustup target add ${{ matrix.target }}

      - name: Install frontend dependencies
        run: npm ci

      - name: Verify icon files exist
        run: |
          if [ "${{ matrix.platform }}" = "windows-latest" ]; then
            ls -la src-tauri/icons/icon.ico
          else
            ls -la src-tauri/icons/icon.icns
          fi
        shell: bash

      - name: Build Tauri app
        run: npm run tauri build -- --target ${{ matrix.target }}

      - name: Upload artifacts (Windows)
        if: matrix.platform == 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: windows-${{ matrix.arch }}
          path: |
            src-tauri/target/${{ matrix.target }}/release/bundle/nsis/*.exe
            src-tauri/target/${{ matrix.target }}/release/bundle/msi/*.msi

      - name: Upload portable executable (Windows)
        if: matrix.platform == 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: windows-${{ matrix.arch }}-portable
          path: src-tauri/target/${{ matrix.target }}/release/*.exe

      - name: Package portable app (macOS)
        if: startsWith(matrix.platform, 'macos')
        run: |
          cd src-tauri/target/${{ matrix.target }}/release/bundle/macos
          zip -r MarkdownReader-${{ matrix.arch }}.app.zip *.app

      - name: Upload artifacts (macOS)
        if: startsWith(matrix.platform, 'macos')
        uses: actions/upload-artifact@v4
        with:
          name: macos-${{ matrix.arch }}
          path: |
            src-tauri/target/${{ matrix.target }}/release/bundle/dmg/*.dmg
            src-tauri/target/${{ matrix.target }}/release/bundle/macos/*.zip

      - name: Upload portable app (macOS)
        if: startsWith(matrix.platform, 'macos')
        uses: actions/upload-artifact@v4
        with:
          name: macos-${{ matrix.arch }}-portable
          path: src-tauri/target/${{ matrix.target }}/release/bundle/macos/*.zip

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Generate release notes
        run: |
          {
            echo "## Changes since v0.1.2"
            echo
            git log --pretty=format:'- %s' v0.1.2..${{ github.ref_name }}
          } > release-notes.md

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            artifacts/windows-x64/*.msi
            artifacts/windows-x64/*.exe
            artifacts/windows-x64-portable/*.exe
            artifacts/macos-aarch64/*.dmg
            artifacts/macos-aarch64/*.zip
            artifacts/macos-aarch64-portable/*.zip
            artifacts/macos-x64/*.dmg
            artifacts/macos-x64/*.zip
            artifacts/macos-x64-portable/*.zip
          draft: false
          prerelease: false
          body_path: release-notes.md
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
